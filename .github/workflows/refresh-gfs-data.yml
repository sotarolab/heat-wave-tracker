name: Refresh GFS forecast data

on:
  schedule:
    # Every 6h, matching GFS's 00Z/06Z/12Z/18Z cycles (~4-5h publish lag)
    - cron: "30 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install eccodes (required by cfgrib)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libeccodes-dev libeccodes-tools

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

      - name: Fetch latest GFS forecast
        run: python scripts/fetch_gfs_conus.py --overwrite

      - name: Fetch latest climate normals (actual vs 1991-2020 NWS normal)
        run: python scripts/fetch_climate_normals.py

      - name: Commit and push if data changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/conus_heat_tracker.nc data/climate_normals.json
          if git diff --cached --quiet; then
            echo "No data change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto-refresh GFS forecast + climate normals data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Render doesn't auto-deploy on a bot commit by default, so without
      # this the site can silently serve stale data indefinitely even
      # though this workflow keeps succeeding - it did exactly that for
      # over a day before being caught. Requires a RENDER_DEPLOY_HOOK_URL
      # repo secret (Render dashboard -> service -> Settings -> Deploy Hook).
      - name: Trigger Render deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set - skipping deploy trigger"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
